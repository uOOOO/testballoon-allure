name: Release

# Manually triggered from the Actions UI: pick a v* tag as the ref to run from.
# The version is derived from the tag name (v0.1.0-K2.4.0 -> 0.1.0-K2.4.0), so
# there is no free-form version input to get wrong; gradle.properties keeps the
# permanent -SNAPSHOT development version untouched.
on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Derive the version from the selected tag
        id: version
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *) echo "::error::Run this workflow from a v* tag (selected ref: $GITHUB_REF)"; exit 1 ;;
          esac
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            *SNAPSHOT*) echo "::error::SNAPSHOT versions are not releasable: $version"; exit 1 ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $version"

      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true

      - name: Lint and tests
        run: >
          ./gradlew lintKotlin
          :testballoon-allure:jvmTest
          :testballoon-allure-android:testAndroidHostTest

      - name: Publish
        run: ./gradlew publishToMavenCentral -Pversion=${{ steps.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
